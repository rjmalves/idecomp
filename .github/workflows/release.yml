name: release

on:
  push:
    tags:
      - "v*"

jobs:
  build-and-publish:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/idecomp
    permissions:
      id-token: write
      contents: write
    steps:
      - uses: actions/checkout@v4
      - name: Install uv
        uses: astral-sh/setup-uv@v3
      - name: Set up Python
        run: uv python install 3.12
      - name: Install the project
        run: uv sync --extra test --extra lint
      - name: Validate version
        run: |
          PKG_VERSION=$(grep -oP '__version__\s*=\s*"\K[^"]+' idecomp/__init__.py)
          TAG_VERSION=${GITHUB_REF#refs/tags/v}
          if [ "$PKG_VERSION" != "$TAG_VERSION" ]; then
            echo "Version mismatch: __init__.py=$PKG_VERSION tag=$TAG_VERSION"
            exit 1
          fi
      - name: Run tests
        run: uv run pytest ./tests
      - name: Type check
        run: uv run mypy ./idecomp
      - name: Lint check
        run: uv run ruff check ./idecomp
      - name: Build package
        run: uv build
      - name: PyPI publish
        uses: pypa/gh-action-pypi-publish@release/v1
      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create ${{ github.ref_name }} --generate-notes
